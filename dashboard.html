<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      animation: fade 0.5s ease;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .top {
      padding: 20px;
      text-align: center;
    }

    .card {
      margin: 15px;
      padding: 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      animation: slide 0.5s ease;
    }

    @keyframes slide {
      from {transform: translateY(20px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }

    .btn {
      display: block;
      margin: 15px;
      padding: 15px;
      text-align: center;
      background: linear-gradient(135deg, #ef4444, #f97316);
      border-radius: 14px;
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 10px 0;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

<script>
  if (!localStorage.getItem("loggedIn")) {
    window.location.href = "login.html";
  }
</script>

<div class="top">
  <h2>Welcome 👋 <span id="u"></span></h2>
</div>

<script>
  document.getElementById("u").innerText =
    localStorage.getItem("user");
</script>

<div class="card">
  🚨 Quick Action Panel
</div>

<a class="btn" href="report.html">Send Emergency Alert</a>

<div class="nav">
  <a href="dashboard.html">Home</a>
  <a href="about.html">About</a>
  <a href="report.html">Report</a>
</div>

</body>
</html>
