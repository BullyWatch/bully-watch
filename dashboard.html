<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    .box {
      text-align:center;
      padding:40px;
    }

    a {
      display:block;
      margin:10px;
      color:#38bdf8;
      text-decoration:none;
    }

    a:hover {
      color:white;
    }
  </style>
</head>

<body>

<script>
  if (!localStorage.getItem("loggedIn")) {
    window.location.href = "login.html";
  }
</script>

  <div class="box">

    <h1>📱 Dashboard</h1>

    <p>Welcome, <span id="user"></span></p>

    <script>
      document.getElementById("user").innerText =
        localStorage.getItem("user");
    </script>

    <a href="report.html">🚨 Report Emergency</a>
    <a href="about.html">📘 About Project</a>

    <a href="index.html" onclick="localStorage.clear()">🚪 Logout</a>

  </div>

</body>
</html>
