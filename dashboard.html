
<div style="margin:15px;padding:15px;background:rgba(255,255,255,0.08);border-radius:16px;">
  <h3>📡 Recent Activity</h3>
  <div id="feed"></div>
</div>

<div style="margin-top:10px;">
  <span id="badge"></span>
</div>

<script>
let logs = JSON.parse(localStorage.getItem("reports") || "[]");
document.getElementById("badge").innerHTML =
  logs.length > 0 ? "🔴 Active Reports: " + logs.length : "🟢 All Safe";
</script>

<script>
function loadFeed() {
  let logs = JSON.parse(localStorage.getItem("reports") || "[]");
  let feed = document.getElementById("feed");

  if (logs.length === 0) {
    feed.innerHTML = "<p>No reports yet</p>";
    return;
  }

  feed.innerHTML = logs.slice(0,3).map(r => `
    <div style="margin:10px 0;padding:10px;background:rgba(255,255,255,0.05);border-radius:10px;">
      🚨 ${r.user}<br>
      🕒 ${r.time}<br>
      📍 ${r.location}
    </div>
  `).join("");
}

loadFeed();
</script>
