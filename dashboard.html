<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #111827;
      font-weight: bold;
    }

    .container {
      padding: 15px;
      padding-bottom: 80px;
    }

    .card {
      background: #1f2937;
      margin-bottom: 10px;
      padding: 15px;
      border-radius: 12px;
      border-left: 5px solid #ef4444;
    }

    .time {
      font-size: 12px;
      opacity: 0.7;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      background: rgba(17, 24, 39, 0.95);
      padding: 12px 0;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="index.html">🏠</a>
  <a href="dashboard.html">📊</a>
  <a href="report.html">🚨</a>
  <a href="about.html">ℹ️</a>
</div>

<header>📊 Live Reports</header>

<div class="container" id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");

onSnapshot(collection(db, "reports"), (snapshot) => {
  feed.innerHTML = "";

  if (snapshot.empty) {
    feed.innerHTML = "<p style='text-align:center;opacity:0.6'>No reports yet</p>";
    return;
  }

  snapshot.forEach(doc => {
    const r = doc.data();

    feed.innerHTML += `
      <div class="card">
        🚨 ${r.user}<br>
        📍 ${r.location}<br>
        <div class="time">🕒 ${r.time}</div>
      </div>
    `;
  });
});
</script>

</body>
</html>
