<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0a0f1a; color:white; }
    header { padding:20px; text-align:center; background:#111827; font-weight:bold; }
    .card { background:#1f2937; margin:10px; padding:15px; border-radius:12px; }
    .nav { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#111827; padding:10px; }
    .nav a { color:white; text-decoration:none; }
  </style>
</head>

<body>

<header>📊 Live Reports</header>

<div id="feed"></div>

<div class="nav">
  <a href="dashboard.html">Home</a>
  <a href="report.html">Report</a>
  <a href="profile.html">Profile</a>
  <a href="admin.html">Admin</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
});

const db = firebase.firestore();
const feed = document.getElementById("feed");

db.collection("reports").onSnapshot(snap => {
  feed.innerHTML = "";

  snap.forEach(doc => {
    const r = doc.data();

    feed.innerHTML += `
      <div class="card">
        🚨 <b>${r.userName}</b><br>
        📍 ${r.location}<br>
        🕒 ${r.time}
      </div>
    `;
  });
});
</script>

</body>
</html>
