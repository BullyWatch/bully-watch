<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - BullyWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    .left {
      font-weight: bold;
      cursor: pointer;
    }

    .right {
      display: flex;
      gap: 18px;
      font-size: 14px;
    }

    .right a {
      color: #e2e8f0;
      text-decoration: none;
      opacity: 0.85;
    }

    .right a:hover {
      opacity: 1;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border-radius: 14px;
      padding: 15px;
      margin: 10px 0;
      border-left: 4px solid #3b82f6;
    }

    .title {
      font-weight: bold;
    }

    .time {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 5px;
    }

    .empty {
      text-align: center;
      margin-top: 40px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="left" onclick="window.location.href='profile.html'">
    👤 Profile
  </div>

  <div class="right">
    <a href="index.html">🏠 Home</a>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="report.html">🚨 Report</a>
  </div>
</div>

<div class="container" id="feed"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const feed = document.getElementById("feed");

db.collection("reports")
  .orderBy("timestamp", "desc")
  .onSnapshot(snapshot => {

    feed.innerHTML = "";

    if (snapshot.empty) {
      feed.innerHTML = "<div class='empty'>No reports yet</div>";
      return;
    }

    snapshot.forEach(doc => {
      const r = doc.data();

      feed.innerHTML += `
        <div class="card">
          <div class="title">🚨 ${r.reportID || "Report"}</div>
          📍 ${r.location || "No location"}<br>
          <div class="time">🕒 ${r.time || ""}</div>
        </div>
      `;
    });

  });
</script>

</body>
</html>
