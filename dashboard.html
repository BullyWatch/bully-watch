<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f6ff;
      animation: fade 0.5s ease-in;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .header {
      padding: 20px;
      text-align: center;
    }

    .card {
      background: white;
      margin: 15px;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.08);
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
    }

    .nav a {
      text-decoration: none;
      color: #2563eb;
      font-size: 14px;
    }

    .btn {
      display: block;
      background: #ef4444;
      color: white;
      padding: 15px;
      text-align: center;
      border-radius: 12px;
      margin: 15px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<script>
  if (!localStorage.getItem("loggedIn")) {
    window.location.href = "login.html";
  }
</script>

<div class="header">
  <h2>Welcome, <span id="u"></span> 👋</h2>
</div>

<script>
  document.getElementById("u").innerText =
    localStorage.getItem("user");
</script>

<div class="card">
  📌 Quick Actions
</div>

<a class="btn" href="report.html">🚨 Report Incident</a>

<div class="nav">
  <a href="dashboard.html">Home</a>
  <a href="about.html">About</a>
  <a href="report.html">Report</a>
</div>

</body>
</html>
