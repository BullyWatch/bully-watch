<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");

function getStatusColor(status) {
  if (status === "ACTIVE") return "#ef4444";
  if (status === "RESOLVED") return "#22c55e";
  return "#6b7280";
}

onSnapshot(collection(db, "reports"), (snapshot) => {
  feed.innerHTML = "";

  if (snapshot.empty) {
    feed.innerHTML = `
      <div style="text-align:center;opacity:0.6;margin-top:40px;">
        No reports yet 🚫
      </div>
    `;
    return;
  }

  snapshot.forEach(doc => {
    const r = doc.data();

    const user = r.user || "Unknown";
    const location = r.location || "No location";
    const time = r.time || "No time";
    const status = r.status || "ACTIVE";

    feed.innerHTML += `
      <div class="card">
        🚨 <b>${user}</b><br>
        📍 ${location}<br>
        🕒 ${time}<br>

        <div style="margin-top:8px;">
          <span style="
            display:inline-block;
            padding:4px 10px;
            border-radius:8px;
            background:${getStatusColor(status)};
            color:white;
            font-size:12px;
          ">
            ${status}
          </span>
        </div>
      </div>
    `;
  });
});
  </script>
