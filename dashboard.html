<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - BullyWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #111827;
      font-size: 18px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1f2937;
      margin-bottom: 10px;
      padding: 15px;
      border-radius: 12px;
      border-left: 5px solid #ef4444;
    }

    .time {
      font-size: 12px;
      opacity: 0.7;
    }

    .empty {
      text-align: center;
      opacity: 0.6;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<header>
  📊 Live Reports Dashboard
</header>

<div class="container" id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");

onSnapshot(collection(db, "reports"), (snapshot) => {
  feed.innerHTML = "";

  if (snapshot.empty) {
    feed.innerHTML = "<div class='empty'>No reports yet</div>";
    return;
  }

  snapshot.forEach(doc => {
    const r = doc.data();

    feed.innerHTML += `
      <div class="card">
        🚨 ${r.user}<br>
        📍 ${r.location}<br>
        <div class="time">🕒 ${r.time}</div>
      </div>
    `;
  });
});
</script>

</body>
</html>
