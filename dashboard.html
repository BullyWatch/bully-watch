<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f7ff;
      margin: 0;
      color: #1f2937;
      text-align: center;
    }

    .box {
      padding: 40px;
    }

    a {
      display: block;
      margin: 10px;
      color: #2563eb;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<script>
  if (!localStorage.getItem("loggedIn")) {
    window.location.href = "login.html";
  }
</script>

  <div class="box">
    <h1>Welcome 👋</h1>

    <p id="user"></p>

    <script>
      document.getElementById("user").innerText =
        "Hello, " + localStorage.getItem("user");
    </script>

    <a href="report.html">🚨 Report Safety Issue</a>
    <a href="about.html">📘 About BullyWatch</a>
    <a href="index.html" onclick="localStorage.clear()">🚪 Logout</a>
  </div>

</body>
</html>
