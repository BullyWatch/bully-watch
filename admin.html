<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0a0f1a;
      color:white;
    }

    header {
      padding:20px;
      text-align:center;
      background:#111827;
      font-weight:bold;
    }

    .card {
      background:#1f2937;
      margin:10px;
      padding:15px;
      border-radius:12px;
      border-left:5px solid #ef4444;
    }

    button {
      margin-top:8px;
      padding:8px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .resolve { background:#22c55e; color:white; }
    .delete { background:#ef4444; color:white; }
  </style>
</head>

<body>

<header>🛡 Admin Panel</header>

<div id="feed"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const adminEmail = "youradmin@email.com";

// simple protection
if (localStorage.getItem("userEmail") !== adminEmail) {
  document.body.innerHTML = "<h2 style='text-align:center'>Access Denied</h2>";
}

const feed = document.getElementById("feed");

db.collection("reports").onSnapshot(snapshot => {
  feed.innerHTML = "";

  snapshot.forEach(doc => {
    const r = doc.data();

    feed.innerHTML += `
      <div class="card">
        👤 <b>${r.userName}</b><br>
        📍 ${r.location}<br>
        🕒 ${r.time}<br>
        ⚡ ${r.status}

        <br>

        <button class="resolve" onclick="resolve('${doc.id}')">Resolve</button>
        <button class="delete" onclick="del('${doc.id}')">Delete</button>
      </div>
    `;
  });
});

function resolve(id) {
  db.collection("reports").doc(id).update({
    status: "RESOLVED"
  });
}

function del(id) {
  db.collection("reports").doc(id).delete();
}
</script>

</body>
</html>
