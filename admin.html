<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel v2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #111827;
      font-weight: bold;
    }

    .controls {
      display: flex;
      gap: 8px;
      padding: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    #feed {
      padding-bottom: 80px;
    }

    .card {
      background: #1f2937;
      margin: 10px;
      padding: 12px;
      border-radius: 12px;
      border-left: 5px solid #ef4444;
    }

    .status {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 5px;
    }

    button {
      margin-top: 8px;
      padding: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .resolve { background: #22c55e; color: white; }
    .delete { background: #ef4444; color: white; }
  </style>
</head>

<body>

<header>🛡 Admin Panel v2</header>

<div class="controls">
  <input id="search" placeholder="Search user..." oninput="render()" />
  
  <select id="filter" onchange="render()">
    <option value="ALL">All</option>
    <option value="ACTIVE">Active</option>
    <option value="RESOLVED">Resolved</option>
  </select>
</div>

<div id="feed"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


const admins = [
  "ranesesjv@gmail.com",
  "felizce.f@gmail.com",
  "joisybsedano@gmail.com"
];

const currentUserEmail = localStorage.getItem("userEmail");

if (!admins.includes(currentUserEmail)) {
  document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Access Denied</h2>";
}


// DATA
let reports = [];


db.collection("reports").onSnapshot(snapshot => {
  reports = [];

  snapshot.forEach(doc => {
    reports.push({ id: doc.id, ...doc.data() });
  });

  render();
});

  
function render() {
  const feed = document.getElementById("feed");
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  feed.innerHTML = "";

  let filtered = reports.filter(r => {
    const nameMatch = r.userName?.toLowerCase().includes(search);
    const status = r.status || "ACTIVE";

    const filterMatch =
      filter === "ALL" ? true :
      status === filter;

    return nameMatch && filterMatch;
  });

  if (filtered.length === 0) {
    feed.innerHTML = "<p style='text-align:center'>No reports found</p>";
    return;
  }

  filtered.forEach(r => {
    feed.innerHTML += `
      <div class="card">
        👤 <b>${r.userName}</b><br>
        📍 ${r.location}<br>
        🕒 ${r.time}<br>

        <div class="status">
          ⚡ Status: ${r.status || "ACTIVE"}
        </div>

        <button class="resolve" onclick="resolve('${r.id}')">
          Resolve
        </button>

        <button class="delete" onclick="removeReport('${r.id}')">
          Delete
        </button>
      </div>
    `;
  });
}


function resolve(id) {
  db.collection("reports").doc(id).update({
    status: "RESOLVED"
  });
}


function removeReport(id) {
  db.collection("reports").doc(id).delete();
}
</script>

</body>
</html>
