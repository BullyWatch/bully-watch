<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b, #0b1220);
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    .stats {
      display: flex;
      justify-content: space-around;
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
    }

    .controls {
      display: flex;
      gap: 10px;
      padding: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      outline: none;
    }

    .card {
      margin: 12px;
      padding: 15px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
    }

    .status {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 6px;
    }

    .extra {
      font-size: 13px;
      margin-top: 6px;
      opacity: 0.9;
      line-height: 1.4;
    }

    button {
      margin-top: 8px;
      padding: 8px 10px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 6px;
    }

    .resolve { background: #22c55e; color: white; }
    .delete { background: #ef4444; color: white; }
    .map { background: #3b82f6; color: white; }

    .empty {
      text-align: center;
      opacity: 0.6;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div>🛡 Admin Panel</div>
</div>

<div class="stats">
  <div>🚨 <span id="total">0</span></div>
  <div>🟢 <span id="active">0</span></div>
  <div>✅ <span id="resolved">0</span></div>
</div>

<div class="controls">
  <input id="search" placeholder="Search user..." oninput="render()">
  <select id="filter" onchange="render()">
    <option value="ALL">All</option>
    <option value="ACTIVE">Active</option>
    <option value="RESOLVED">Resolved</option>
  </select>
</div>

<div id="feed"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
});

const db = firebase.firestore();

let reports = [];

db.collection("reports")
  .orderBy("timestamp", "desc")
  .onSnapshot(snapshot => {

    reports = [];

    let total = 0;
    let active = 0;
    let resolved = 0;

    snapshot.forEach(doc => {
      const r = doc.data();

      reports.push({
        id: doc.id,
        reportID: r.reportID || "No ID",
        userName: r.userName || "Unknown",
        email: r.email || "",
        location: r.location || "No location",
        time: r.time || "No time",
        status: r.status || "ACTIVE",
        type: r.type || "GENERAL",
        note: r.note || "",
        forOther: r.forOther || false
      });

      total++;
      if (r.status === "RESOLVED") resolved++;
      else active++;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("active").innerText = active;
    document.getElementById("resolved").innerText = resolved;

    render();
  });

function render() {
  const feed = document.getElementById("feed");
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  feed.innerHTML = "";

  let filtered = reports.filter(r => {
    return r.userName.toLowerCase().includes(search) &&
      (filter === "ALL" || r.status === filter);
  });

  if (filtered.length === 0) {
    feed.innerHTML = "<div class='empty'>No reports found</div>";
    return;
  }

  filtered.forEach(r => {

    const isCoords = r.location.includes(",") && !r.location.includes("Online");
    const map = isCoords ? `https://www.google.com/maps?q=${r.location}` : null;

    feed.innerHTML += `
      <div class="card">
        🚨 <b>${r.reportID}</b><br>
        👤 ${r.userName}<br>
        📧 ${r.email}<br>
        📌 ${r.type}<br>
        📍 ${r.location}<br>
        🕒 ${r.time}<br>

        <div class="extra">
          📝 ${r.note || "No details"}<br>
          👥 ${r.forOther ? "Reported for someone else" : "Self report"}
        </div>

        <div class="status">⚡ ${r.status}</div>

        ${map ? `
          <a href="${map}" target="_blank">
            <button class="map">Open Map</button>
          </a>
        ` : ""}

        <button class="resolve" onclick="resolveReport('${r.id}')">Resolve</button>
        <button class="delete" onclick="deleteReport('${r.id}')">Delete</button>
      </div>
    `;
  });
}

function resolveReport(id) {
  db.collection("reports").doc(id).update({
    status: "RESOLVED"
  });
}

function deleteReport(id) {
  db.collection("reports").doc(id).delete();
}
</script>

</body>
</html>
