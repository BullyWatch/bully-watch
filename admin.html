<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #111827;
      font-weight: bold;
    }

    #feed {
      padding-bottom: 80px;
    }

    .card {
      background: #1f2937;
      margin: 10px;
      padding: 12px;
      border-radius: 12px;
      border-left: 5px solid #ef4444;
    }

    .status {
      font-size: 12px;
      opacity: 0.8;
    }

    button {
      margin-top: 8px;
      padding: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .resolve {
      background: #22c55e;
      color: white;
    }

    .delete {
      background: #ef4444;
      color: white;
    }

    .topbar {
      position: sticky;
      top: 0;
      background: #111827;
      padding: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<header>🛡 Admin Panel</header>

<div id="feed"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_EMAIL = "ranesesjv@gmail.com";

// 🔐 ACCESS CONTROL
if (localStorage.getItem("userEmail") !== ADMIN_EMAIL) {
  document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Access Denied</h2>";
}

// 📊 LOAD REPORTS
const feed = document.getElementById("feed");

db.collection("reports").orderBy("time", "desc").onSnapshot(snapshot => {
  feed.innerHTML = "";

  if (snapshot.empty) {
    feed.innerHTML = "<p style='text-align:center'>No reports yet</p>";
    return;
  }

  snapshot.forEach(doc => {
    const r = doc.data();

    feed.innerHTML += `
      <div class="card">
        👤 <b>${r.userName}</b><br>
        📍 ${r.location}<br>
        🕒 ${r.time}<br>

        <div class="status">
          ⚡ Status: ${r.status || "ACTIVE"}
        </div>

        <button class="resolve" onclick="resolve('${doc.id}')">
          Resolve
        </button>

        <button class="delete" onclick="removeReport('${doc.id}')">
          Delete
        </button>
      </div>
    `;
  });
});

// ✅ MARK AS RESOLVED
function resolve(id) {
  db.collection("reports").doc(id).update({
    status: "RESOLVED"
  });
}

// 🗑 DELETE REPORT
function removeReport(id) {
  db.collection("reports").doc(id).delete();
}
</script>

</body>
</html>
