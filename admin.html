<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b, #0b1220);
      color: white;
    }

    header {
      padding: 22px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .stats {
      display: flex;
      justify-content: space-around;
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    .stats div {
      text-align: center;
      font-size: 13px;
    }

    .controls {
      display: flex;
      gap: 10px;
      padding: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    #feed {
      padding-bottom: 80px;
    }

    .card {
      margin: 12px;
      padding: 15px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: 0.2s ease;
    }

    .card:hover {
      transform: scale(1.01);
    }

    .status {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 6px;
    }

    button {
      margin-top: 10px;
      padding: 8px 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .resolve {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .delete {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    .map {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
    }

  </style>
</head>

<body>

<header>🛡 BullyWatch Admin Dashboard</header>

<div class="stats">
  <div>🚨<br><span id="total">0</span></div>
  <div>🟢<br><span id="active">0</span></div>
  <div>✅<br><span id="resolved">0</span></div>
</div>

<div class="controls">
  <input id="search" placeholder="Search user..." oninput="render()" />
  
  <select id="filter" onchange="render()">
    <option value="ALL">All</option>
    <option value="ACTIVE">Active</option>
    <option value="RESOLVED">Resolved</option>
  </select>
</div>

<div id="feed"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const admins = [
  "ranesesjv@gmail.com",
  "felizce.f@gmail.com",
  "joisybsedano@gmail.com"
  "cocoaolate@gmail.com"
];

if (!admins.includes(localStorage.getItem("userEmail"))) {
  document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Access Denied</h2>";
}

let reports = [];

db.collection("reports").onSnapshot(snapshot => {

  reports = [];

  let total = 0;
  let active = 0;
  let resolved = 0;

  snapshot.forEach(doc => {
    const r = doc.data();
    reports.push({ id: doc.id, ...r });

    total++;
    (r.status === "RESOLVED") ? resolved++ : active++;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("active").innerText = active;
  document.getElementById("resolved").innerText = resolved;

  render();
});

function render() {
  const feed = document.getElementById("feed");
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  feed.innerHTML = "";

  let filtered = reports.filter(r => {
    const matchName = r.userName?.toLowerCase().includes(search);
    const matchStatus = filter === "ALL" ? true : (r.status || "ACTIVE") === filter;
    return matchName && matchStatus;
  });

  filtered.forEach(r => {

    let map = r.location?.includes(",")
      ? `https://www.google.com/maps?q=${r.location}`
      : null;

    feed.innerHTML += `
      <div class="card">
        👤 <b>${r.userName}</b><br>
        📍 ${r.location}<br>
        🕒 ${r.time}<br>

        <div class="status">⚡ ${r.status || "ACTIVE"}</div>

        ${map ? `<a href="${map}" target="_blank">
          <button class="map">Open Map</button>
        </a>` : ""}

        <button class="resolve" onclick="resolve('${r.id}')">Resolve</button>
        <button class="delete" onclick="removeReport('${r.id}')">Delete</button>
      </div>
    `;
  });
}

function resolve(id) {
  db.collection("reports").doc(id).update({ status: "RESOLVED" });
}

function removeReport(id) {
  db.collection("reports").doc(id).delete();
}
</script>

</body>
</html>
