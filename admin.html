<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
</head>

<body style="background:#0a0f1a;color:white;font-family:Arial;">

<h2 style="text-align:center;">Admin Panel</h2>

<div id="feed"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
});

const ADMIN_EMAIL = "ranesesjv@gmail.com";

if (localStorage.getItem("userEmail") !== ADMIN_EMAIL) {
  document.body.innerHTML = "<h2 style='text-align:center'>Access Denied</h2>";
}

const db = firebase.firestore();
const feed = document.getElementById("feed");

db.collection("reports").onSnapshot(snap => {
  feed.innerHTML = "";

  snap.forEach(doc => {
    const r = doc.data();

    feed.innerHTML += `
      <div style="background:#1f2937;margin:10px;padding:10px;border-radius:10px;">
        👤 ${r.userName}<br>
        📍 ${r.location}<br>
        🕒 ${r.time}
      </div>
    `;
  });
});
</script>

</body>
</html>
