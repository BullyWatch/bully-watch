<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b, #0b1220);
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    .left {
      font-weight: bold;
    }

    .right {
      display: flex;
      gap: 14px;
      font-size: 14px;
    }

    .right a {
      color: #e2e8f0;
      text-decoration: none;
      opacity: 0.85;
    }

    .right a:hover {
      opacity: 1;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    .controls {
      display: flex;
      gap: 10px;
      padding: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    #feed {
      padding-bottom: 40px;
    }

    .card {
      margin: 12px;
      padding: 15px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
    }

    .status {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 6px;
    }

    button {
      margin-top: 8px;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 6px;
    }

    .resolve { background: #22c55e; color: white; }
    .delete { background: #ef4444; color: white; }
    .map { background: #3b82f6; color: white; }

    .empty {
      text-align: center;
      opacity: 0.6;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="left">👤 Admin Panel</div>

  <div class="right">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="report.html">Report</a>
  </div>
</div>

<div class="stats">
  <div>🚨 <span id="total">0</span></div>
  <div>🟢 <span id="active">0</span></div>
  <div>✅ <span id="resolved">0</span></div>
</div>

<div class="controls">
  <input id="search" placeholder="Search user..." oninput="render()" />
  <select id="filter" onchange="render()">
    <option value="ALL">All</option>
    <option value="ACTIVE">Active</option>
    <option value="RESOLVED">Resolved</option>
  </select>
</div>

<div id="feed"></div>

<audio id="notifySound" src="notification.mp3" preload="auto"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const admins = [
  "ranesesjv@gmail.com",
  "felizce.f@gmail.com",
  "joisybsedano@gmail.com",
  "cocoaolate@gmail.com"
];

if (!admins.includes(localStorage.getItem("userEmail"))) {
  document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Access Denied</h2>";
}

let reports = [];
let firstLoad = true;
let audioUnlocked = false;

const notifySound = document.getElementById("notifySound");

function unlockAudio() {
  if (audioUnlocked) return;

  notifySound.play().then(() => {
    notifySound.pause();
    notifySound.currentTime = 0;
    audioUnlocked = true;
  }).catch(() => {});
}

document.body.addEventListener("click", unlockAudio, { once: true });
document.body.addEventListener("touchstart", unlockAudio, { once: true });

db.collection("reports").onSnapshot(snapshot => {

  reports = [];

  let total = 0;
  let active = 0;
  let resolved = 0;

  const changes = snapshot.docChanges();

  if (!firstLoad) {
    const hasNew = changes.some(c => c.type === "added");
    if (hasNew && audioUnlocked) {
      notifySound.currentTime = 0;
      notifySound.play().catch(() => {});
    }
  }

  firstLoad = false;

  snapshot.forEach(doc => {
    const r = doc.data();

    reports.push({
      id: doc.id,
      reportID: r.reportID || "No ID",
      userName: r.userName || "Unknown",
      location: r.location || "No location",
      time: r.time || "No time",
      status: r.status || "ACTIVE"
    });

    total++;
    if (r.status === "RESOLVED") resolved++;
    else active++;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("active").innerText = active;
  document.getElementById("resolved").innerText = resolved;

  render();
});

function render() {
  const feed = document.getElementById("feed");
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  feed.innerHTML = "";

  let filtered = reports.filter(r => {
    return r.userName.toLowerCase().includes(search) &&
      (filter === "ALL" || r.status === filter);
  });

  if (filtered.length === 0) {
    feed.innerHTML = "<div class='empty'>No reports found</div>";
    return;
  }

  filtered.forEach(r => {

    const map = r.location.includes(",")
      ? `https://www.google.com/maps?q=${r.location}`
      : null;

    feed.innerHTML += `
      <div class="card">
        🚨 <b>${r.reportID}</b><br>
        👤 ${r.userName}<br>
        📍 ${r.location}<br>
        🕒 ${r.time}<br>

        <div class="status">⚡ ${r.status}</div>

        ${map ? `<a href="${map}" target="_blank">
          <button class="map">Open Map</button>
        </a>` : ""}

        <button class="resolve" onclick="resolve('${r.id}')">Resolve</button>
        <button class="delete" onclick="removeReport('${r.id}')">Delete</button>
      </div>
    `;
  });
}

function resolve(id) {
  db.collection("reports").doc(id).update({
    status: "RESOLVED"
  });
}

function removeReport(id) {
  db.collection("reports").doc(id).delete();
}
</script>

</body>
  </html>
