<!DOCTYPE html>
<html>
<head>
  <title>Report - BullyWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #6366f1, #22d3ee, #3b82f6);
      color: white;
      height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(10px);
    }

    .left {
      font-weight: bold;
      cursor: pointer;
    }

    .right {
      display: flex;
      gap: 18px;
      font-size: 14px;
    }

    .right a {
      color: #e2e8f0;
      text-decoration: none;
    }

    .container {
      height: calc(100vh - 60px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 15px;
    }

    .card {
      text-align: center;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 360px;
    }

    .panic {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, #ef4444, #7f1d1d);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(255,0,0,0.4);
    }

    .panic:active {
      transform: scale(0.95);
    }

    .more {
      font-size: 13px;
      opacity: 0.9;
      cursor: pointer;
      text-decoration: underline;
    }

    .modal {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111827;
      padding: 20px;
      border-radius: 20px 20px 0 0;
      display: none;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
    }

    .admin-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #111827;
      color: white;
      padding: 12px 14px;
      border-radius: 50px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="left" onclick="location.href='profile.html'">👤</div>

  <div class="right">
    <a href="index.html">🏠</a>
    <a href="dashboard.html">📊</a>
    <a href="report.html">🚨</a>
  </div>
</div>

<div class="container">
  <div class="panic" onclick="quickReport()">
    🚨 TAP TO ALERT
  </div>

  <div class="more" onclick="openModal()">
    More options
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <h3>Detailed Report</h3>

  <select id="type">
    <option value="PHYSICAL">Physical</option>
    <option value="CYBER">Cyberbullying</option>
  </select>

  <input id="note" placeholder="What happened? (optional)">

  <label style="font-size:13px;">
    <input type="checkbox" id="other">
    Reporting for someone else
  </label>

  <button onclick="detailedReport()">Send Detailed Report</button>
</div>

<a class="admin-btn" href="admin.html">🛡</a>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function generateReportID() {
  const n = new Date();
  return `${n.getMonth()+1}${n.getDate()}-${n.getHours()}${n.getMinutes()}`;
}

/* 🔴 FAST PANIC REPORT */
function quickReport() {
  const userName = localStorage.getItem("userName") || "Anonymous";

  navigator.geolocation.getCurrentPosition(pos => {
    db.collection("reports").add({
      reportID: generateReportID(),
      userName,
      location: `${pos.coords.latitude}, ${pos.coords.longitude}`,
      time: new Date().toLocaleString(),
      timestamp: Date.now(),
      status: "ACTIVE",
      type: "EMERGENCY"
    });

    alert("🚨 Emergency Sent!");
  });
}

/* ⚙️ MODAL */
function openModal() {
  document.getElementById("modal").style.display = "block";
}

/* 🧾 DETAILED REPORT */
function detailedReport() {
  const type = document.getElementById("type").value;
  const note = document.getElementById("note").value;
  const other = document.getElementById("other").checked;
  const userName = localStorage.getItem("userName") || "Anonymous";

  function save(location) {
    db.collection("reports").add({
      reportID: generateReportID(),
      userName,
      location,
      note,
      type,
      forOther: other,
      time: new Date().toLocaleString(),
      timestamp: Date.now(),
      status: "ACTIVE"
    });

    alert("Report Sent!");
  }

  if (type === "CYBER") {
    save("Online / Cyberbullying");
  } else {
    navigator.geolocation.getCurrentPosition(pos => {
      save(`${pos.coords.latitude}, ${pos.coords.longitude}`);
    });
  }
}
</script>

</body>
  </html>
