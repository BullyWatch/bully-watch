<!DOCTYPE html>
<html>
<head>
  <title>Report - BullyWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #6366f1, #22d3ee, #3b82f6);
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(10px);
    }

    .container {
      height: calc(100vh - 60px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 15px;
    }

    .panic {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, #ef4444, #7f1d1d);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(255,0,0,0.4);
      transition: 0.2s;
    }

    .panic:active {
      transform: scale(0.95);
    }

    .more {
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      opacity: 0.9;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .modal {
      width: 90%;
      max-width: 380px;
      background: #111827;
      padding: 20px;
      border-radius: 16px;
      animation: pop 0.2s ease;
    }

    @keyframes pop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .admin-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #111827;
      padding: 12px 14px;
      border-radius: 50px;
      text-decoration: none;
      color: white;
      z-index: 1;
    }

    .hint {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div onclick="location.href='profile.html'">👤</div>
  <div>
    <a href="index.html" style="color:white;margin-right:10px;">🏠</a>
    <a href="dashboard.html" style="color:white;margin-right:10px;">📊</a>
    <a href="report.html" style="color:white;">🚨</a>
  </div>
</div>

<div class="container">
  <div class="panic" onclick="quickReport()">🚨 ALERT</div>
  <div class="more" onclick="openModal()">More options</div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Detailed Report</h3>

    <select id="type" onchange="togglePin()">
      <option value="PHYSICAL">Physical Bullying</option>
      <option value="CYBER">Cyberbullying</option>
    </select>

    <input id="note" placeholder="What happened?">

    <label style="display:flex;align-items:center;gap:8px;margin-top:10px;">
      <input type="checkbox" id="other" onchange="togglePin()">
      Report for someone else
    </label>

    <input id="manualLocation" placeholder="Paste pin (e.g. 14.5995, 120.9842)">
    <div class="hint" id="hint" style="display:none;">
      📍 Open Google Maps → tap location → copy coordinates
    </div>

    <button onclick="detailedReport()">Send Report</button>
  </div>
</div>

<a class="admin-btn" href="admin.html">🛡</a>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
});

const db = firebase.firestore();

function generateReportID() {
  const n = new Date();
  return `${n.getMonth()+1}${n.getDate()}-${n.getHours()}${n.getMinutes()}`;
}

function openModal() {
  document.getElementById("overlay").style.display = "flex";
}

function closeModal() {
  document.getElementById("overlay").style.display = "none";
}

function togglePin() {
  const show = document.getElementById("other").checked;
  document.getElementById("manualLocation").style.display = show ? "block" : "none";
  document.getElementById("hint").style.display = show ? "block" : "none";
}

function quickReport() {
  const userName = localStorage.getItem("userName") || "Anonymous";

  const docRef = db.collection("reports").add({
    reportID: generateReportID(),
    userName,
    location: "Getting location...",
    time: new Date().toLocaleString(),
    timestamp: Date.now(),
    status: "ACTIVE",
    type: "EMERGENCY"
  });

  alert("🚨 Alert Sent Instantly!");

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      docRef.then(ref => {
        ref.update({
          location: `${pos.coords.latitude}, ${pos.coords.longitude}`
        });
      });
    });
  }
}

function detailedReport() {
  const userName = localStorage.getItem("userName") || "Anonymous";
  const type = document.getElementById("type").value;
  const note = document.getElementById("note").value;
  const other = document.getElementById("other").checked;
  const manual = document.getElementById("manualLocation").value;

  function save(location) {
    db.collection("reports").add({
      reportID: generateReportID(),
      userName,
      location,
      note,
      type,
      forOther: other,
      time: new Date().toLocaleString(),
      timestamp: Date.now(),
      status: "ACTIVE"
    });

    alert("Report Sent!");
    closeModal();
  }

  if (type === "CYBER") {
    save("Online / Cyberbullying");
    return;
  }

  if (other) {
    if (!manual) {
      alert("Please paste a location pin");
      return;
    }
    save(manual);
    return;
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => save(`${pos.coords.latitude}, ${pos.coords.longitude}`),
      () => save("Location not available")
    );
  } else {
    save("No GPS");
  }
}
</script>

</body>
</html>
