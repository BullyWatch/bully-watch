<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// IMPORTANT FIX: make sure function is globally available
window.sendReport = async function () {
  try {
    console.log("Sending report...");

    await addDoc(collection(db, "reports"), {
      user: "Anonymous",
      time: new Date().toLocaleString(),
      location: "School",
      status: "ACTIVE"
    });

    alert("🚨 Alert Sent Successfully!");
  } catch (error) {
    console.error("Error sending report:", error);
    alert("Failed: " + error.message);
  }
};
</script>
