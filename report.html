<!DOCTYPE html>
<html>
<head>
  <title>Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b1220;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card {
      text-align:center;
      background:#111827;
      padding:30px;
      border-radius:15px;
      width:90%;
      max-width:400px;
    }

    button {
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#ef4444;
      color:white;
      font-weight:bold;
      font-size:18px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>🚨 Emergency Alert</h2>
  <button onclick="sendReport()">SEND ALERT</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function sendReport() {

  const userName = localStorage.getItem("userName") || "Anonymous";
  const userId = localStorage.getItem("userEmail") || "unknown";

  db.collection("reports").add({
    userId: userId,
    userName: userName,
    location: "School",
    time: new Date().toLocaleString(),
    status: "ACTIVE"
  })
  .then(() => alert("🚨 Report Sent"))
  .catch(err => alert(err.message));
}
</script>

</body>
</html>
