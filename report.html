<!DOCTYPE html>
<html>
<head>
  <title>Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #dc2626, #f97316);
      color: white;
      text-align: center;
      animation: fade 0.5s ease;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .box {
      padding: 100px 20px;
    }

    .btn {
      background: white;
      color: black;
      padding: 18px 25px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {transform: scale(1);}
      50% {transform: scale(1.05);}
      100% {transform: scale(1);}
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: rgba(0,0,0,0.2);
      padding: 10px;
    }

    .nav a {
      color: white;
      text-decoration: none;
    }
  </style>
</head>

<body>

<script>
  if (!localStorage.getItem("loggedIn")) {
    window.location.href = "login.html";
  }
</script>

<div class="box">
  <h1>🚨 Emergency</h1>
  <p>Press only when needed</p>

  <a class="btn" onclick="alert('Alert Sent (Demo Mode)')">
    SEND ALERT
  </a>
</div>

<div class="nav">
  <a href="dashboard.html">Home</a>
  <a href="about.html">About</a>
  <a href="report.html">Report</a>
</div>

</body>
</html>
