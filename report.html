<!DOCTYPE html>
<html>
<head>
  <title>Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #dc2626, #f97316);
      color: white;
      text-align: center;
    }

    .box {
      padding: 80px 20px;
    }

    .btn {
      background: white;
      color: black;
      padding: 18px 24px;
      border-radius: 16px;
      font-weight: bold;
      display: inline-block;
      cursor: pointer;
    }

    .btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<script>
  if (!localStorage.getItem("loggedIn")) {
    window.location.href = "login.html";
  }
</script>

<div class="box">
  <h1>🚨 Emergency Report</h1>
  <p>Smart reporting system</p>

  <div class="btn" onclick="sendReport()">
    SEND ALERT
  </div>
</div>

<script>
function sendReport() {
  const user = localStorage.getItem("user") || "Unknown";

  const report = {
    user: user,
    time: new Date().toLocaleString(),
    location: "School Campus (Simulated)",
    status: "Active Alert"
  };

  let logs = JSON.parse(localStorage.getItem("reports") || "[]");
  logs.unshift(report);
  localStorage.setItem("reports", JSON.stringify(logs));

  alert("🚨 Alert Sent Successfully!");
}
</script>

</body>
</html>
