<!DOCTYPE html>
<html>
<head>
  <title>Report - BullyWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #6366f1, #22d3ee, #3b82f6);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      text-align: center;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    button {
      padding: 15px;
      width: 100%;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
    }

    .nav a {
      color: #e2e8f0;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="index.html">🏠</a>
  <a href="dashboard.html">📊</a>
  <a href="report.html">🚨</a>
  <a href="profile.html">👤</a>
</div>

<div class="card">
  <h2>🚨 Send Alert</h2>
  <button onclick="sendReport()">SEND ALERT</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function generateReportID() {
  const now = new Date();
  const month = now.toLocaleString('en-US', { month: 'short' })[0].toUpperCase();
  const day = now.getDate();
  let hours = now.getHours().toString().padStart(2, '0');
  let minutes = now.getMinutes().toString().padStart(2, '0');
  return `${month}${day}-${hours}${minutes}`;
}

function sendReport() {
  const userName = localStorage.getItem("userName") || "Anonymous";
  const email = localStorage.getItem("userEmail") || "";
  const reportID = generateReportID();

  function save(location) {
    db.collection("reports").add({
      reportID: reportID,
      userName: userName,
      email: email,
      location: location,
      time: new Date().toLocaleString(),
      timestamp: Date.now(),
      status: "ACTIVE"
    });
    alert("🚨 Report Sent!");
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        save(`${lat}, ${lng}`);
      },
      () => save("Location not available")
    );
  } else {
    save("GPS not supported");
  }
}
</script>

</body>
</html>
