<!DOCTYPE html>
<html>
<head>
  <title>Login - BullyWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 350px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .small {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>🔐 BullyWatch Login</h2>

  <input id="user" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="small">Secure Firebase Authentication</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  const email = user.value;
  const password = pass.value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "./dashboard.html";
    })
    .catch(err => alert(err.message));
};
</script>

</body>
</html>
