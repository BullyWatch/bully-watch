<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; display:flex; justify-content:center; align-items:center; height:100vh; }
    .card { background:#111827; padding:25px; border-radius:15px; width:90%; max-width:350px; }
    input, button { width:100%; padding:12px; margin:8px 0; border:none; border-radius:10px; }
    button { background:#3b82f6; color:white; font-weight:bold; }
  </style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <input id="name" placeholder="Your Name (Evan Burger)">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function login() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  if (!name) return alert("Enter your name");

  auth.signInWithEmailAndPassword(email, pass)
    .then((cred) => {

      // SAVE USER IN FIRESTORE (REAL SYSTEM)
      db.collection("users").doc(email).set({
        userName: name,
        email: email
      });

      localStorage.setItem("userName", name);
      localStorage.setItem("userEmail", email);

      window.location.href = "dashboard.html";
    })
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
