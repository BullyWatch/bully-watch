<!DOCTYPE html>
<html>
<head>
  <title>Login - BullyWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 350px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      background: rgba(17, 24, 39, 0.95);
      padding: 12px 0;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="index.html">🏠</a>
  <a href="dashboard.html">📊</a>
  <a href="report.html">🚨</a>
  <a href="about.html">ℹ️</a>
</div>

<div class="card">
  <h2>🔐 Login</h2>

  <input id="user" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  signInWithEmailAndPassword(auth, user.value, pass.value)
    .then(() => window.location.href = "./dashboard.html")
    .catch(err => alert(err.message));
};
</script>

</body>
</html>
