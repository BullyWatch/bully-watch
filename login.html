<!DOCTYPE html>
<html>
<head>
  <title>Login - BullyWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6366f1, #22d3ee, #3b82f6);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      padding: 30px 25px;
      border-radius: 20px;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 12px;
      outline: none;
      background: rgba(255,255,255,0.9);
      color: #1e293b;
      font-size: 14px;
    }

    input::placeholder {
      color: #64748b;
    }

    button {
      width: 100%;
      padding: 13px;
      margin-top: 10px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .small {
      margin-top: 12px;
      font-size: 13px;
      opacity: 0.9;
    }

    .small a {
      color: #fff;
      font-weight: bold;
      text-decoration: underline;
      cursor: pointer;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
    }

    .nav a {
      color: #e2e8f0;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="index.html">🏠</a>
  <a href="dashboard.html">📊</a>
  <a href="report.html">🚨</a>
  <a href="profile.html">👤</a>
</div>

<div class="card">
  <h2>🔐 Login</h2>

  <input id="name" placeholder="Your Name (e.g. Evan Burger)">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="small">
    Don’t have an account?
    <a onclick="signup()">Sign up here</a>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function login() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  if (!name) return alert("Enter your name");

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => saveUser(name, email))
    .catch(err => alert(err.message));
}

function signup() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  if (!name) return alert("Enter your name");

  auth.createUserWithEmailAndPassword(email, pass)
    .then(() => saveUser(name, email))
    .catch(err => alert(err.message));
}

function saveUser(name, email) {
  db.collection("users").doc(email).set({
    userName: name,
    email: email
  });

  localStorage.setItem("userName", name);
  localStorage.setItem("userEmail", email);

  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
