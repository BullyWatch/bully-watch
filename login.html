<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f7ff;
      text-align: center;
      padding-top: 80px;
      color: #1f2937;
    }

    input {
      padding: 10px;
      margin: 8px;
      width: 220px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 10px 18px;
      background: #2563eb;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

  <h1>Login</h1>

  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>

  <p id="msg"></p>

  <script>
    function login() {
      const u = document.getElementById("user").value;
      const p = document.getElementById("pass").value;

      if (u && p) {
        localStorage.setItem("user", u);
        localStorage.setItem("loggedIn", "true");
        window.location.href = "dashboard.html";
      } else {
        document.getElementById("msg").innerText = "Please fill in both fields.";
      }
    }
  </script>

</body>
</html>
