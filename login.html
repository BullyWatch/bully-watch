<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 350px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      background: rgba(17, 24, 39, 0.95);
      padding: 12px 0;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <input id="name" placeholder="Full Name (e.g. JV Rañeses)">
  <input id="user" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function login() {
  const displayName = document.getElementById("name").value;

  auth.signInWithEmailAndPassword(user.value, pass.value)
    .then((cred) => {
      localStorage.setItem("userName", displayName);
      localStorage.setItem("userEmail", cred.user.email);
      window.location.href = "dashboard.html";
    })
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
