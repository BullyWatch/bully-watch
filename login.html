<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#0f172a;color:white;font-family:Arial;text-align:center;padding-top:80px;">

  <h1>Login</h1>

  <input id="user" placeholder="Username" style="padding:10px;margin:10px;"><br>
  <input id="pass" type="password" placeholder="Password" style="padding:10px;margin:10px;"><br>

  <button onclick="login()" style="padding:10px 20px;background:#38bdf8;border:none;">
    Login
  </button>

  <p id="msg"></p>

  <script>
    function login() {
      const u = document.getElementById("user").value;
      const p = document.getElementById("pass").value;

      if (u && p) {
        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("user", u);
        window.location.href = "dashboard.html";
      } else {
        document.getElementById("msg").innerText = "Fill all fields";
      }
    }
  </script>

</body>
</html>
