<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f6ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      animation: fade 0.6s ease-in;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      width: 280px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Enter</button>
</div>

<script>
  function login() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if (u && p) {
      localStorage.setItem("user", u);
      localStorage.setItem("loggedIn", "true");
      window.location.href = "dashboard.html";
    }
  }
</script>

</body>
</html>
