<!DOCTYPE html>
<html>
<head>
  <title>Profile - BullyWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    .left {
      font-weight: bold;
      cursor: pointer;
    }

    .right {
      display: flex;
      gap: 18px;
      font-size: 14px;
    }

    .right a {
      color: white;
      text-decoration: none;
      opacity: 0.85;
    }

    .right a:hover {
      opacity: 1;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 60px);
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      padding: 25px;
      border-radius: 18px;
      width: 90%;
      max-width: 360px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .save { background: #3b82f6; color: white; }
    .danger { background: #ef4444; color: white; }

    .email {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="left" onclick="window.location.href='profile.html'">
    👤 Profile
  </div>

  <div class="right">
    <a href="index.html">🏠 Home</a>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="report.html">🚨 Report</a>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="email" id="email"></div>

    <input id="name" placeholder="Your Name">

    <button class="save" onclick="save()">Save Name</button>
    <button class="danger" onclick="logout()">Logout</button>
  </div>
</div>

<script>
document.getElementById("name").value = localStorage.getItem("userName") || "";
document.getElementById("email").innerText = localStorage.getItem("userEmail") || "";

function save() {
  const name = document.getElementById("name").value.trim();
  if (!name) return alert("Enter a name");
  localStorage.setItem("userName", name);
  alert("Saved!");
}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>
