<!DOCTYPE html>
<html>
<head>
  <title>Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0b1220; color:white; display:flex; justify-content:center; align-items:center; height:100vh; }
    .card { text-align:center; background:#111827; padding:30px; border-radius:15px; width:90%; max-width:400px; }
    button { width:100%; padding:15px; border:none; border-radius:12px; background:#ef4444; color:white; font-weight:bold; }
  </style>
</head>

<body>

<div class="card">
  <h2>🚨 Emergency Alert</h2>
  <button onclick="sendReport()">SEND ALERT</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
});

const db = firebase.firestore();

function sendReport() {
  db.collection("reports").add({
    userName: localStorage.getItem("userName") || "Anonymous",
    email: localStorage.getItem("userEmail") || "",
    location: "School",
    time: new Date().toLocaleString(),
    status: "ACTIVE"
  });

  alert("🚨 Sent!");
}
</script>

</body>
</html>
