<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b1220;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card {
      background:#111827;
      padding:25px;
      border-radius:15px;
      width:90%;
      max-width:350px;
      text-align:center;
    }

    input, button {
      width:100%;
      padding:12px;
      margin:8px 0;
      border:none;
      border-radius:10px;
    }

    button {
      background:#3b82f6;
      color:white;
      font-weight:bold;
    }

    .danger {
      background:#ef4444;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>👤 Profile</h2>

  <input id="name" placeholder="Your Name">

  <p><b>Email:</b></p>
  <p id="email"></p>

  <button onclick="save()">Save Name</button>
  <button class="danger" onclick="logout()">Logout</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_0NmIehy-FLZ-t9FGEemKcH_G1-Z1vgk",
  authDomain: "bullywatch-12ce1.firebaseapp.com",
  projectId: "bullywatch-12ce1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const email = localStorage.getItem("userEmail");

document.getElementById("email").innerText = email || "Not logged in";

document.getElementById("name").value =
  localStorage.getItem("userName") || "";

function save() {
  const newName = document.getElementById("name").value;

  localStorage.setItem("userName", newName);
  alert("Saved!");
}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>
