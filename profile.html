<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 350px;
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>👤 Profile</h2>

  <input id="editName" placeholder="Your Name">

  <p><b>Email:</b></p>
  <p id="email"></p>

  <button onclick="saveName()">Save Name</button>
  <button onclick="logout()" style="background:#ef4444">Logout</button>
</div>

<script>
document.getElementById("editName").value =
  localStorage.getItem("userName") || "";

document.getElementById("email").innerText =
  localStorage.getItem("userEmail") || "Not logged in";

function saveName() {
  const newName = document.getElementById("editName").value.trim();

  if (!newName) {
    alert("Name cannot be empty");
    return;
  }

  localStorage.setItem("userName", newName);
  alert("Name updated!");
}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>
