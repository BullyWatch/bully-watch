<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 350px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #ef4444;
      color: white;
      font-weight: bold;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      background: rgba(17, 24, 39, 0.95);
      padding: 12px 0;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="index.html">🏠</a>
  <a href="dashboard.html">📊</a>
  <a href="report.html">🚨</a>
  <a href="profile.html">👤</a>
</div>

<div class="card">
  <h2>👤 Profile</h2>

  <p><b>Name:</b> <span id="name"></span></p>
  <p><b>Email:</b> <span id="email"></span></p>

  <button onclick="logout()">Logout</button>
</div>

<script>
document.getElementById("name").innerText =
  localStorage.getItem("userName") || "No name set";

document.getElementById("email").innerText =
  localStorage.getItem("userEmail") || "Not logged in";

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>
