<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0b1220; color:white; display:flex; justify-content:center; align-items:center; height:100vh; }
    .card { background:#111827; padding:25px; border-radius:15px; width:90%; max-width:350px; text-align:center; }
    input, button { width:100%; padding:12px; margin:8px 0; border:none; border-radius:10px; }
    button { background:#3b82f6; color:white; font-weight:bold; }
    .danger { background:#ef4444; }
  </style>
</head>

<body>

<div class="card">
  <h2>👤 Profile</h2>

  <input id="name" placeholder="Your Name">

  <p id="email"></p>

  <button onclick="save()">Save Name</button>
  <button class="danger" onclick="logout()">Logout</button>
</div>

<script>
document.getElementById("name").value = localStorage.getItem("userName") || "";
document.getElementById("email").innerText = localStorage.getItem("userEmail") || "";

function save() {
  localStorage.setItem("userName", document.getElementById("name").value);
  alert("Saved!");
}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>
