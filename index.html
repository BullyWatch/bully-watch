<!DOCTYPE html>
<html>
<head>
  <title>BullyWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6366f1, #22d3ee, #3b82f6);
      color: white;
      height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(10px);
    }

    .left {
      font-weight: bold;
      cursor: pointer;
    }

    .right {
      display: flex;
      gap: 18px;
      font-size: 14px;
    }

    .right a {
      color: #e2e8f0;
      text-decoration: none;
      opacity: 0.85;
    }

    .right a:hover {
      opacity: 1;
    }

    .container {
      height: calc(100vh - 60px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      text-align: center;
      padding: 40px 30px;
      border-radius: 22px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 350px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% {transform: translateY(0);}
      50% {transform: translateY(-6px);}
    }

    h1 {
      margin: 0;
      font-size: 36px;
    }

    p {
      opacity: 0.9;
      margin-top: 8px;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 20px;
      background: white;
      color: #1e293b;
      border-radius: 14px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="left" onclick="window.location.href='profile.html'">
    👤 Profile
  </div>

  <div class="right">
    <a href="index.html">🏠 Home</a>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="report.html">🚨 Report</a>
  </div>
</div>

<div class="container">
  <div class="card">
    <h1>🛡 BullyWatch</h1>
    <p>Making schools safer</p>

    <a class="btn" href="login.html">Get Started</a>
  </div>
</div>

</body>
</html>
