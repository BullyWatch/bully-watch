<!DOCTYPE html>
<html>
<head>
  <title>BullyWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f6ff;
      color: #1f2937;
      animation: fade 0.6s ease-in;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .container {
      padding: 60px 20px;
      text-align: center;
    }

    h1 {
      color: #2563eb;
      font-size: 42px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      background: #2563eb;
      color: white;
      border-radius: 12px;
      text-decoration: none;
    }

    .btn:hover {
      background: #1d4ed8;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div class="container">

  <h1>👋 BullyWatch</h1>

  <div class="card">
    <p>A simple school safety app prototype designed for awareness and quick reporting.</p>
  </div>

  <a class="btn" href="login.html">Get Started</a>

</div>

</body>
</html>
