<!DOCTYPE html>
<html>
<head>
  <title>BullyWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6366f1, #22d3ee, #3b82f6);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      text-align: center;
      padding: 40px 30px;
      border-radius: 22px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 350px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% {transform: translateY(0);}
      50% {transform: translateY(-6px);}
    }

    h1 {
      margin: 0;
      font-size: 36px;
    }

    p {
      opacity: 0.9;
      margin-top: 8px;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 20px;
      background: white;
      color: #1e293b;
      border-radius: 14px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;

      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .nav a {
      color: #e2e8f0;
      text-decoration: none;
      font-size: 18px;
      transition: 0.2s;
    }

    .nav a:hover {
      transform: scale(1.2);
      color: white;
    }

  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="index.html">🏠</a>
  <a href="dashboard.html">📊</a>
  <a href="report.html">🚨</a>
  <a href="profile.html">👤</a>
</div>

<div class="card">
  <h1> BullyWatch</h1>
  <p>Making schools safer</p>

  <a class="btn" href="login.html">Get Started</a>
</div>

</body>
</html>
